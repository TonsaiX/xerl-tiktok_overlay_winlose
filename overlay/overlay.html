<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
 margin:0;
 background:transparent;
 font-family:Arial;
 color:white;
}

.container{
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 height:100vh;
}

.score{
 font-size:90px;
 font-weight:bold;
 position:relative;
}

.win{
 color:#00ff9d;
}

.lose{
 color:#ff4040;
}

.bump{
 animation:bump .4s;
}

@keyframes bump{

0%{transform:scale(1)}
40%{transform:scale(1.4)}
100%{transform:scale(1)}

}

.float{
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 font-size:50px;
 animation:float 1s forwards;
}

@keyframes float{

0%{
 opacity:1;
 transform:translate(-50%,0)
}

100%{
 opacity:0;
 transform:translate(-50%,-120px)
}

}

</style>
</head>

<body>

<div class="container">

<div class="score win">
WIN <span id="win">0</span>
</div>

<div class="score lose">
LOSE <span id="lose">0</span>
</div>

</div>

<script>

let ws
let lastWin=0
let lastLose=0

function bump(id){

 const el=document.getElementById(id)

 el.classList.remove("bump")
 void el.offsetWidth
 el.classList.add("bump")

}

function float(type,val){

 const parent=document.querySelector("."+type)

 const el=document.createElement("div")

 el.className="float "+type

 el.innerText=val>0? "+"+val : val

 parent.appendChild(el)

 setTimeout(()=>el.remove(),1000)

}

async function sync(){

 const state=await fetch("/score").then(r=>r.json())

 document.getElementById("win").innerText=state.win
 document.getElementById("lose").innerText=state.lose

 lastWin=state.win
 lastLose=state.lose

}

async function connect(){

 const config=await fetch("/config").then(r=>r.json())

 ws=new WebSocket(config.ws)

 ws.onopen=()=>{
  console.log("ws connected")
 }

 ws.onmessage=(event)=>{

  const data=JSON.parse(event.data)

  if(data.win!==lastWin){

   const diff=data.win-lastWin

   document.getElementById("win").innerText=data.win

   bump("win")
   float("win",diff)

   lastWin=data.win
  }

  if(data.lose!==lastLose){

   const diff=data.lose-lastLose

   document.getElementById("lose").innerText=data.lose

   bump("lose")
   float("lose",diff)

   lastLose=data.lose
  }

 }

 ws.onclose=()=>{
  console.log("reconnect...")
  setTimeout(()=>{
   sync()
   connect()
  },3000)
 }

 ws.onerror=()=>{
  ws.close()
 }

}

sync()
connect()

</script>

</body>
</html>
