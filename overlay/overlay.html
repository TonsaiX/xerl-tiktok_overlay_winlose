<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>PRO Stream Overlay</title>

<style>

body{
margin:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* glass container */

.container{

position:relative;

backdrop-filter: blur(18px);
background:rgba(0,0,0,0.35);

border-radius:22px;

padding:30px 50px;

box-shadow:
0 0 40px rgba(0,0,0,0.6),
inset 0 0 20px rgba(255,255,255,0.05);

text-align:center;

}

/* date */

.date{
font-size:28px;
margin-bottom:25px;
font-weight:600;
opacity:.9;
}

/* score */

.score{

font-size:46px;
font-weight:700;

margin:12px 0;

position:relative;

transition:all .2s ease;

}

.win{
color:#00ffae;
text-shadow:0 0 15px #00ffae;
}

.lose{
color:#ff4a4a;
text-shadow:0 0 15px #ff4a4a;
}

/* bump */

.bump{
animation:bump .25s ease;
}

@keyframes bump{
0%{transform:scale(1)}
50%{transform:scale(1.35)}
100%{transform:scale(1)}
}

/* floating */

.float{

position:absolute;
left:50%;
top:0;

font-size:26px;
font-weight:bold;

animation:floatUp 1s ease forwards;

pointer-events:none;

}

@keyframes floatUp{

0%{
opacity:1;
transform:translate(-50%,0) scale(1)
}

100%{
opacity:0;
transform:translate(-50%,-50px) scale(1.4)
}

}

/* fire effect */

.fire{

position:absolute;
bottom:-10px;
left:50%;
width:120px;
height:120px;

background:radial-gradient(circle,
rgba(255,200,0,.8),
rgba(255,0,0,.6),
transparent);

filter:blur(20px);

transform:translateX(-50%);

animation:fire .6s ease;

pointer-events:none;

}

@keyframes fire{

0%{
opacity:1;
transform:translateX(-50%) scale(.6);
}

100%{
opacity:0;
transform:translateX(-50%) scale(1.6);
}

}

/* crack */

.crack{

position:absolute;

width:160px;
height:160px;

background:radial-gradient(circle,
rgba(255,255,255,.9),
transparent);

filter:blur(12px);

animation:crack .5s ease;

pointer-events:none;

}

@keyframes crack{

0%{
opacity:1;
transform:scale(.5);
}

100%{
opacity:0;
transform:scale(1.8);
}

}

/* combo text */

.combo{

position:absolute;
top:-40px;
left:50%;

font-size:24px;
font-weight:bold;

color:#ffd700;

transform:translateX(-50%);

animation:combo .8s ease;

}

@keyframes combo{

0%{
opacity:0;
transform:translate(-50%,20px);
}

40%{
opacity:1;
transform:translate(-50%,0);
}

100%{
opacity:0;
transform:translate(-50%,-20px);
}

}

</style>
</head>

<body>

<div class="container">

<div id="date" class="date">📅 ...</div>

<div class="score win">
Win <span id="win">0</span>
</div>

<div class="score lose">
Lose <span id="lose">0</span>
</div>

</div>


<script>

let lastWin = 0
let lastLose = 0
let combo = 0
let comboTimer = null

function bump(id){

const el=document.getElementById(id)

el.classList.remove("bump")
void el.offsetWidth
el.classList.add("bump")

}

function floatEffect(parent,value){

const el=document.createElement("div")

el.className="float"
el.innerText=value

parent.appendChild(el)

setTimeout(()=>el.remove(),1000)

}

/* fire effect */

function fireEffect(parent){

const fire=document.createElement("div")

fire.className="fire"

parent.appendChild(fire)

setTimeout(()=>fire.remove(),600)

}

/* lose crack */

function crackEffect(parent){

const crack=document.createElement("div")

crack.className="crack"

crack.style.left="50%"
crack.style.top="20px"
crack.style.transform="translateX(-50%)"

parent.appendChild(crack)

setTimeout(()=>crack.remove(),500)

}

/* combo win */

function comboEffect(parent){

combo++

clearTimeout(comboTimer)

if(combo>=2){

const el=document.createElement("div")

el.className="combo"

el.innerText="COMBO x"+combo

parent.appendChild(el)

setTimeout(()=>el.remove(),800)

}

comboTimer=setTimeout(()=>{
combo=0
},3000)

}

/* connect */

async function connect(){

const config = await fetch("/config").then(r=>r.json())

const ws = new WebSocket(config.ws)

ws.onmessage=(event)=>{

const data=JSON.parse(event.data)

document.getElementById("date").innerText="📅 "+data.date

const winEl=document.getElementById("win")
const loseEl=document.getElementById("lose")

/* win */

if(data.win!==lastWin){

let diff=data.win-lastWin

winEl.innerText=data.win

bump("win")

const parent=winEl.parentElement

if(diff>0){

floatEffect(parent,"+1")
fireEffect(parent)
comboEffect(parent)

}

if(diff<0){

floatEffect(parent,"-1")

}

lastWin=data.win

}

/* lose */

if(data.lose!==lastLose){

let diff=data.lose-lastLose

loseEl.innerText=data.lose

bump("lose")

const parent=loseEl.parentElement

if(diff>0){

floatEffect(parent,"+1")
crackEffect(parent)

}

if(diff<0){

floatEffect(parent,"-1")

}

lastLose=data.lose

}

}

/* reconnect */

ws.onclose=()=>{

console.log("reconnect...")

setTimeout(connect,3000)

}

}

connect()

</script>

</body>
</html>
