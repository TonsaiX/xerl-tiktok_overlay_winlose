<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
 margin:0;
 background:transparent;
 font-family:Arial, Helvetica, sans-serif;
 color:white;
 overflow:hidden;
}

/* layout */

.container{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 text-align:center;
}

.score{
 font-size:120px;
 font-weight:900;
 position:relative;
 letter-spacing:4px;
}

.label{
 font-size:40px;
 opacity:.9;
 margin-bottom:10px;
}

/* colors */

.win{
 color:#00ff9d;
 text-shadow:
 0 0 15px #00ff9d,
 0 0 30px #00ff9d;
}

.lose{
 color:#ff4040;
 text-shadow:
 0 0 15px #ff4040,
 0 0 30px #ff4040;
}

/* number pop */

.bump{
 animation:pop .35s cubic-bezier(.2,1.5,.5,1);
}

@keyframes pop{

0%{transform:scale(1)}
40%{transform:scale(1.55)}
100%{transform:scale(1)}

}

/* floating number */

.float{
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 font-size:60px;
 font-weight:900;
 pointer-events:none;
 animation:floatUp 1.2s forwards;
}

@keyframes floatUp{

0%{
 opacity:1;
 transform:translate(-50%,0) scale(1);
}

60%{
 opacity:1;
}

100%{
 opacity:0;
 transform:translate(-50%,-160px) scale(1.2);
}

}

/* combo animation */

.combo{
 position:absolute;
 left:50%;
 top:-100px;
 transform:translateX(-50%);
 font-size:70px;
 font-weight:bold;
 color:gold;
 text-shadow:0 0 20px gold;
 animation:comboPop 1s forwards;
}

@keyframes comboPop{

0%{
 opacity:0;
 transform:translate(-50%,40px) scale(.5);
}

50%{
 opacity:1;
 transform:translate(-50%,0) scale(1.4);
}

100%{
 opacity:0;
 transform:translate(-50%,-40px) scale(1);
}

}

/* particles */

.particle{
 position:absolute;
 width:8px;
 height:8px;
 border-radius:50%;
 opacity:.9;
 animation:particle 1s forwards;
}

@keyframes particle{

0%{
 transform:translate(0,0);
 opacity:1;
}

100%{
 transform:translate(var(--x),var(--y));
 opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<div class="label">WIN</div>
<div class="score win">
<span id="win">0</span>
</div>

<div style="height:40px"></div>

<div class="label">LOSE</div>
<div class="score lose">
<span id="lose">0</span>
</div>

</div>

<script>

let ws
let lastWin=0
let lastLose=0

function bump(id){

 const el=document.getElementById(id)

 el.classList.remove("bump")
 void el.offsetWidth
 el.classList.add("bump")

}

function float(type,val){

 const parent=document.querySelector("."+type)

 const el=document.createElement("div")

 el.className="float "+type
 el.innerText=val>0? "+"+val : val

 parent.appendChild(el)

 setTimeout(()=>el.remove(),1200)

}

function combo(parent,val){

 if(Math.abs(val)<3) return

 const el=document.createElement("div")

 el.className="combo"
 el.innerText="COMBO "+Math.abs(val)

 parent.appendChild(el)

 setTimeout(()=>el.remove(),1000)

}

function particles(parent,color){

 for(let i=0;i<10;i++){

  const p=document.createElement("div")

  p.className="particle"

  p.style.background=color

  const x=(Math.random()*200-100)+"px"
  const y=(Math.random()*-200)+"px"

  p.style.setProperty("--x",x)
  p.style.setProperty("--y",y)

  parent.appendChild(p)

  setTimeout(()=>p.remove(),1000)

 }

}

async function sync(){

 const state=await fetch("/score").then(r=>r.json())

 document.getElementById("win").innerText=state.win
 document.getElementById("lose").innerText=state.lose

 lastWin=state.win
 lastLose=state.lose

}

async function connect(){

 const config=await fetch("/config").then(r=>r.json())

 ws=new WebSocket(config.ws)

 ws.onmessage=(event)=>{

  const data=JSON.parse(event.data)

  if(data.win!==lastWin){

   const diff=data.win-lastWin

   const el=document.getElementById("win")

   el.innerText=data.win

   bump("win")

   float("win",diff)

   combo(el.parentElement,diff)

   particles(el.parentElement,"#00ff9d")

   lastWin=data.win
  }

  if(data.lose!==lastLose){

   const diff=data.lose-lastLose

   const el=document.getElementById("lose")

   el.innerText=data.lose

   bump("lose")

   float("lose",diff)

   combo(el.parentElement,diff)

   particles(el.parentElement,"#ff4040")

   lastLose=data.lose
  }

 }

 ws.onclose=()=>{
  setTimeout(()=>{
   sync()
   connect()
  },3000)
 }

 ws.onerror=()=>{
  ws.close()
 }

}

sync()
connect()

</script>

</body>
</html>
