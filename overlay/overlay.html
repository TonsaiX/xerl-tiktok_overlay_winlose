<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Win Lose Overlay</title>

<style>

body{
 margin:0;
 background:transparent;
 font-family:Arial, Helvetica, sans-serif;
 color:white;
}

.container{
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 height:100vh;
 text-align:center;
}

.date{
 font-size:60px;
 font-weight:bold;
 margin-bottom:30px;
}

.score{
 font-size:90px;
 font-weight:bold;
 margin:10px;
 position:relative;
}

.win{
 color:#00ff9d;
 text-shadow:0 0 20px #00ff9d;
}

.lose{
 color:#ff4040;
 text-shadow:0 0 20px #ff4040;
}

/* เด้งตัวเลข */

.bump{
 animation:bump 0.4s;
}

@keyframes bump{

0%{transform:scale(1)}
40%{transform:scale(1.45)}
100%{transform:scale(1)}

}

/* +1 -1 floating */

.float{
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 font-size:50px;
 font-weight:bold;
 opacity:0;
 pointer-events:none;
 animation:floatUp 1s ease forwards;
}

.float.win{
 color:#00ff9d;
}

.float.lose{
 color:#ff4040;
}

@keyframes floatUp{

0%{
 transform:translate(-50%,0);
 opacity:1;
}

100%{
 transform:translate(-50%,-120px);
 opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<div id="date" class="date">📅</div>

<div class="score win">
WIN <span id="win">0</span>
</div>

<div class="score lose">
LOSE <span id="lose">0</span>
</div>

</div>

<script>

async function start(){

 const config = await fetch("/config").then(r=>r.json())

 const ws = new WebSocket(config.ws)

 let lastWin = 0
 let lastLose = 0

 function bump(id){

  const el = document.getElementById(id)

  el.classList.remove("bump")
  void el.offsetWidth
  el.classList.add("bump")

 }

 function showFloat(type,value){

  const container = document.querySelector("." + type)

  const el = document.createElement("div")

  el.className="float "+type

  if(value>0)
  el.innerText="+"+value
  else
  el.innerText=value

  container.appendChild(el)

  setTimeout(()=>{
   el.remove()
  },1000)

 }

 ws.onmessage = (event)=>{

  const data = JSON.parse(event.data)

  const dateEl = document.getElementById("date")
  const winEl = document.getElementById("win")
  const loseEl = document.getElementById("lose")

  dateEl.innerText="📅 "+data.date

  if(data.win !== lastWin){

   const diff=data.win-lastWin

   winEl.innerText=data.win
   bump("win")

   showFloat("win",diff)

   lastWin=data.win

  }

  if(data.lose !== lastLose){

   const diff=data.lose-lastLose

   loseEl.innerText=data.lose
   bump("lose")

   showFloat("lose",diff)

   lastLose=data.lose

  }

 }

}

start()

</script>

</body>
</html>
